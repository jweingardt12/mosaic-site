<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mosaic Multiview Receiver</title>
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    <!-- TODO: preconnect to the MLB segment CDN host once confirmed via Chrome Remote Debugger network panel on a real stream, e.g. <link rel="preconnect" href="https://<mlb-cdn-host>" crossorigin> -->
    <link rel="stylesheet" href="./receiver.css?v=fix6">
  </head>
  <body>
    <cast-media-player id="media-player"></cast-media-player>
    <main id="multiview" class="receiver-shell" data-mode="idle" data-count="0">
      <section class="idle-state" aria-live="polite">
        <div class="brand">Mosaic</div>
        <div class="status">Ready for multiview</div>
      </section>
      <section id="slot-grid" class="slot-grid" aria-label="Mosaic multiview"></section>
    </main>
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="./hls.min.js"></script>
    <script src="./receiver.js?v=fix6"></script>
  </body>
</html>
